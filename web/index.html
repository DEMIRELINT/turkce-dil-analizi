<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Türkçe Dil Analizi — Panel</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
    --fg: #e7eaf0; --muted: #9aa3b2; --accent: #4f8cff; --accent2: #6ee7b7;
    --imla: #f87171; --dil_bilgisi: #fbbf24; --ton: #a78bfa; --tutarlilik: #34d399;
    --ok: #34d399; --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.55 -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
  }
  header {
    padding: 20px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 650; }
  header .logo { height: 36px; width: auto; display: block; }
  header .sub { color: var(--muted); font-size: 13px; }
  main { max-width: 980px; margin: 0 auto; padding: 24px 28px 80px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
  }
  label.file, textarea, button { font: inherit; }
  textarea {
    width: 100%; min-height: 120px; resize: vertical; color: var(--fg);
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px;
  }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
  label.file {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 14px; color: var(--fg);
  }
  label.file input { display: none; }
  #fileName { color: var(--muted); font-size: 13px; }
  button {
    background: var(--accent); color: #0a0c10; border: 0; border-radius: 10px;
    padding: 10px 18px; font-weight: 650; cursor: pointer; margin-left: auto;
  }
  button:disabled { opacity: .5; cursor: default; }
  .hint { color: var(--muted); font-size: 12.5px; margin-top: 10px; }
  .ghost-btn {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 14px; font-weight: 600; font-size: 13.5px;
    cursor: pointer; margin-left: 0;
  }
  .ghost-btn:hover { border-color: var(--accent); }
  #newAnalysisBar { margin-bottom: 16px; }

  /* Belge okuma notu (kapsam özeti + okunamayan içerik uyarısı) */
  #extractNote { display: none; margin-bottom: 16px; font-size: 13px; }
  #extractNote .ex-summary { color: var(--muted); }
  #extractNote .ex-warn {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--warn, #d8a657); color: var(--warn, #d8a657);
    background: rgba(216, 166, 87, .08);
  }

  /* İlerleme akışı */
  #progressCard { display: none; }
  .bar { height: 6px; background: var(--panel2); border-radius: 99px; overflow: hidden; margin: 6px 0 16px; }
  .bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s ease; }
  .steps { display: flex; flex-direction: column; gap: 8px; }
  .step { display: flex; align-items: center; gap: 10px; color: var(--muted); }
  .step .dot {
    width: 16px; height: 16px; border-radius: 99px; border: 2px solid var(--line);
    flex: none; position: relative;
  }
  .step.active { color: var(--fg); }
  .step.active .dot { border-color: var(--accent); }
  .step.active .dot::after {
    content: ""; position: absolute; inset: 1px; border-radius: 99px;
    border: 2px solid transparent; border-top-color: var(--accent);
    animation: spin .7s linear infinite;
  }
  .step.done { color: var(--fg); }
  .step.done .dot { border-color: var(--ok); background: var(--ok); }
  .step.done .dot::after { content: "✓"; position: absolute; inset: -3px 0 0 2px; color: #0a0c10; font-size: 11px; font-weight: 800; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Canlı parça ızgarası — paralel işlemeyi görünür kılar (her parça bir hücre) */
  .prog-head { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .prog-head b { color: var(--fg); }
  .prog-head .run-n { color: var(--warn, #d8a657); font-weight: 650; }
  .chunk-grid { display: flex; flex-wrap: wrap; gap: 5px; margin: 0 0 16px; max-height: 170px; overflow: auto; }
  .cell {
    width: 18px; height: 18px; border-radius: 5px;
    background: var(--panel2); border: 1px solid var(--line);
    transition: background .2s ease, border-color .2s ease;
  }
  .cell.run {
    border-color: var(--warn, #d8a657); background: rgba(216, 166, 87, .30);
    animation: pulse 1s ease-in-out infinite;
  }
  .cell.done { background: var(--ok); border-color: var(--ok); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

  /* Denetlenen eksenler (imla/dil bilgisi/ton/tutarlılık) — bilgi rozetleri */
  .axis-badges { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; }
  .axis-badge {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 600; color: var(--muted);
    border: 1px solid var(--line); border-radius: 99px; padding: 3px 11px;
    background: var(--panel2); opacity: .55;
    transition: opacity .2s ease, color .2s ease;
  }
  .axis-badge .ax-dot { width: 9px; height: 9px; border-radius: 99px; background: var(--line); flex: none; }
  .axis-badge.active, .axis-badge.done { opacity: 1; color: var(--fg); }
  .axis-badge.active .ax-dot { animation: pulse 1s ease-in-out infinite; }
  .axis-badge.active.imla .ax-dot { background: var(--imla); }
  .axis-badge.active.dil_bilgisi .ax-dot { background: var(--dil_bilgisi); }
  .axis-badge.active.ton .ax-dot { background: var(--ton); }
  .axis-badge.active.tutarlilik .ax-dot { background: var(--tutarlilik); }
  .axis-badge.done .ax-dot { background: var(--ok); animation: none; }
  .grid-hint { color: var(--muted); font-size: 12px; margin: 0 0 8px; display: none; }

  /* Sonuç */
  #resultCard { display: none; }
  .result-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { border-radius: 99px; padding: 4px 12px; font-size: 13px; font-weight: 600; border: 1px solid var(--line); }
  .chip b { font-weight: 800; }
  /* Özet rozetleri aynı zamanda eksen süzgeci (G): tıkla → yalnız o ekseni göster */
  .filter-chip { cursor: pointer; user-select: none; transition: background .15s ease; }
  .filter-chip:hover { background: var(--panel2); }
  .filter-chip.active { background: var(--panel2); box-shadow: 0 0 0 1px var(--accent) inset; }

  /* Bulgular eksene göre başlıklı bölümlere ayrılır (H) */
  .find-section { margin-bottom: 4px; }
  .section-head {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin: 16px 0 8px; display: flex; align-items: center; gap: 8px;
  }
  .find-section:first-child .section-head { margin-top: 0; }
  .section-head .section-count {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 99px;
    padding: 1px 8px; font-size: 11px; font-weight: 700;
  }
  .section-head.imla { color: var(--imla); }
  .section-head.dil_bilgisi { color: var(--dil_bilgisi); }
  .section-head.ton { color: var(--ton); }
  .section-head.tutarlilik { color: var(--tutarlilik); }

  /* İki sütunlu sonuç düzeni: solda kaynak metin (%66), sağda bulgular (%33) */
  .result-split { display: flex; gap: 20px; align-items: flex-start; }
  .source-pane { flex: 2; min-width: 0; }
  .findings-pane { flex: 1; min-width: 0; max-height: calc(100vh - 220px); overflow-y: auto; }
  @media (max-width: 900px) {
    .result-split { flex-direction: column; }
    .findings-pane { max-height: none; width: 100%; }
  }

  .source {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; white-space: pre-wrap; word-break: break-word;
    max-height: calc(100vh - 220px); overflow: auto; font-size: 14.5px;
  }
  mark { border-radius: 4px; padding: 0 2px; color: #0a0c10; font-weight: 600; cursor: help; }
  mark.imla { background: var(--imla); }
  mark.dil_bilgisi { background: var(--dil_bilgisi); }
  mark.ton { background: var(--ton); }
  mark.tutarlilik { background: var(--tutarlilik); }
  .finding {
    border-left: 4px solid var(--line); background: var(--panel2);
    border-radius: 0 10px 10px 0; padding: 12px 14px; margin-bottom: 10px;
  }
  .finding.imla { border-left-color: var(--imla); }
  .finding.dil_bilgisi { border-left-color: var(--dil_bilgisi); }
  .finding.ton { border-left-color: var(--ton); }
  .finding.tutarlilik { border-left-color: var(--tutarlilik); }
  /* Tıklanabilir bulgu kartları/satırları: her occurrence kaynak metne kaydırır. */
  [data-jump] { cursor: pointer; }
  .finding[data-jump]:hover, .finding .head[data-jump]:hover { outline: 1px solid var(--accent); }
  .finding .head { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .tag { font-size: 11.5px; font-weight: 700; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: .03em; color: #0a0c10; }
  .tag.imla { background: var(--imla); }
  .tag.dil_bilgisi { background: var(--dil_bilgisi); }
  .tag.ton { background: var(--ton); }
  .tag.tutarlilik { background: var(--tutarlilik); }
  .finding .excerpt { font-weight: 650; }
  .finding .arrow { color: var(--muted); }
  .finding .sug { color: var(--accent2); font-weight: 650; }
  .finding .exp { color: var(--muted); font-size: 13.5px; margin-top: 4px; }
  .finding .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .empty { color: var(--ok); font-weight: 600; }
  .err { color: var(--imla); font-weight: 600; }

  /* Gözlem kanalı — bulgulardan GÖRSEL olarak ayrık (nötr, kesikli çerçeve,
     bulgu renkleri yok): "doğrulanmamış, editör değerlendirmesi gerekir". */
  .obs-section { margin-top: 22px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .obs-head { font-size: 14px; font-weight: 700; color: var(--muted); margin: 0 0 4px; }
  .obs-disclaimer { color: var(--muted); font-size: 12.5px; margin: 0 0 10px; font-style: italic; }
  .obs-item {
    border: 1px dashed var(--line); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 8px; background: transparent;
  }
  .obs-item .obs-excerpt { font-weight: 650; color: var(--fg); }
  .obs-item .obs-note { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .chip.obs-chip { border-color: var(--muted); color: var(--muted); cursor: default; }

  /* Toplulaştırılmış bulgu: tekrar rozeti + genişletilebilir konum listesi */
  .finding .count-badge {
    background: var(--panel); border: 1px solid var(--line); border-radius: 99px;
    padding: 2px 10px; font-size: 11.5px; font-weight: 700; color: var(--muted);
  }
  .finding details { margin-top: 8px; }
  .finding summary { cursor: pointer; color: var(--accent); font-size: 12.5px; user-select: none; }
  .loc-rows { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .loc-row {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 10px; font-size: 12.5px; color: var(--fg);
  }
  .loc-row:hover { border-color: var(--accent); }
  .loc-row b { color: var(--muted); font-weight: 700; margin-right: 6px; }
  .loc-row .arrow { color: var(--muted); }
  .loc-row .sug { color: var(--accent2); font-weight: 650; }

  /* Log paneli açılıp kapanır */
  mark.flash { outline: 2px solid var(--accent); animation: flash-fade 1s ease-out; }
  @keyframes flash-fade { 0% { outline-color: var(--accent); } 100% { outline-color: transparent; } }

  /* Düzen: solda açılıp-kapanır log paneli + küçük ok düğmesi + sağda içerik */
  .layout { display: flex; align-items: flex-start; }
  aside#logPanel {
    width: 280px; flex: none; align-self: stretch;
    border-right: 1px solid var(--line); background: var(--panel);
    position: sticky; top: 0; max-height: 100vh; overflow-y: auto; overflow-x: hidden;
    padding: 16px 14px;
    transition: width .2s ease, padding .2s ease, opacity .15s ease;
  }
  .log-collapsed aside#logPanel {
    width: 0; padding: 16px 0; border-right: 0; opacity: 0; pointer-events: none;
  }
  aside#logPanel h2 {
    font-size: 13px; font-weight: 700; color: var(--muted); margin: 0 0 12px;
    text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
  }
  /* Küçük, modern açma/kapama oku — panelin sağ kenarında sabit durur. */
  #logToggle {
    flex: none; align-self: stretch; width: 18px; margin: 0;
    background: var(--panel); border: 1px solid var(--line); border-left: 0;
    border-radius: 0 8px 8px 0; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; line-height: 1; padding: 0;
    position: sticky; top: 0; max-height: 100vh;
    transition: color .15s ease, border-color .15s ease;
  }
  #logToggle:hover { color: var(--fg); border-color: var(--accent); }
  .log-collapsed #logToggle { border-left: 1px solid var(--line); border-radius: 8px; }
  .log-empty { color: var(--muted); font-size: 13px; }
  .log-item {
    border: 1px solid var(--line); background: var(--panel2); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer; position: relative;
  }
  .log-item:hover { border-color: var(--accent); }
  .log-item.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .log-item .log-title {
    font-weight: 650; font-size: 13.5px; padding-right: 20px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .log-item .log-meta { color: var(--muted); font-size: 11.5px; margin-top: 4px; }
  .log-item .log-meta .kind { text-transform: uppercase; letter-spacing: .03em; }
  .log-item .log-del {
    position: absolute; top: 6px; right: 8px; color: var(--muted);
    font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 6px;
    background: transparent; border: 0; cursor: pointer; margin: 0;
  }
  .log-item .log-del:hover { color: var(--imla); background: rgba(248,113,113,.12); }
  main { flex: 1; min-width: 0; }
  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    aside#logPanel {
      width: 100%; position: static; max-height: 240px;
      border-right: 0; border-bottom: 1px solid var(--line);
    }
    .log-collapsed aside#logPanel { width: 100%; max-height: 0; padding: 0; opacity: 0; }
    #logToggle {
      width: 100%; height: 22px; border-radius: 0; border: 0;
      border-bottom: 1px solid var(--line); position: static; max-height: none;
    }
  }
</style>
</head>
<body>
<header>
  <img class="logo" src="/logo.png" alt="Türkçe Dil Analizi" onerror="this.replaceWith(Object.assign(document.createElement('h1'),{textContent:'Türkçe Dil Analizi'}))">
  <span class="sub">Dokümanda Türkçe Kullanımı ve Uyumluluk Analizi Sistemi</span>
</header>

<div class="layout">
<aside id="logPanel">
  <h2>Log — Geçmiş Analizler</h2>
  <div id="logList"><div class="log-empty">Henüz kayıt yok.</div></div>
</aside>
<button id="logToggle" title="Log panelini aç/kapat">‹</button>

<main>
  <div class="card" id="inputCard">
    <textarea id="text" placeholder="Analiz edilecek metni buraya yapıştırın ya da aşağıdan bir .docx seçin…"></textarea>
    <div class="row">
      <label class="file">
        📄 .docx seç
        <input type="file" id="file" accept=".docx">
      </label>
      <span id="fileName"></span>
      <button id="run">Analiz Et</button>
    </div>
    <div class="hint">Belge ve metin sunucuda işlenir; analiz adımları aşağıda canlı akar. (Yalnız 127.0.0.1)</div>
  </div>

  <div id="newAnalysisBar" style="display:none;">
    <button id="newAnalysisBtn" class="ghost-btn">+ Yeni Metin/Belge Analiz Et</button>
  </div>

  <div id="extractNote"></div>

  <div class="card" id="progressCard">
    <div class="bar"><i id="barFill"></i></div>
    <div class="prog-head" id="progHead"></div>
    <div class="axis-badges" id="axisBadges"></div>
    <div class="grid-hint" id="gridHint">Her kare belgenin bir bölümüdür.</div>
    <div class="chunk-grid" id="chunkGrid"></div>
    <div class="steps" id="steps"></div>
  </div>

  <div class="card" id="resultCard">
    <div class="result-toolbar" id="resultToolbar">
      <button id="downloadBtn" class="ghost-btn" title="Sonuçları ajan-dostu Markdown dosyası olarak indir">⬇ Raporu indir (.md)</button>
      <button id="copyBtn" class="ghost-btn" title="Raporu panoya kopyala (ajana yapıştırmak için)">📋 Kopyala</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="result-split">
      <div class="source-pane"><div class="source" id="source"></div></div>
      <div class="findings-pane"><div id="findings"></div></div>
    </div>
  </div>
</main>
</div>

<script>
const $ = (id) => document.getElementById(id);
const TYPE_LABEL = { imla: "İmla", dil_bilgisi: "Dil bilgisi", ton: "Ton", tutarlilik: "Tutarlılık" };
const TYPES = ["imla", "dil_bilgisi", "ton", "tutarlilik"];

// Kural kimliğini (rule_id) insan-okur Türkçe etikete çevirir. Ham kimlik
// tooltip olarak korunur; eşleşme yoksa kimlik olduğu gibi gösterilir.
const RULE_LABEL = {
  "IMLA-DE-DA": "de/da ekinin yazımı", "IMLA-KI": "ki bağlacının yazımı",
  "IMLA-MI": "mı/mi soru ekinin yazımı", "IMLA-BITISIK": "bitişik yazım",
  "IMLA-AYRI": "ayrı yazım", "IMLA-BAGLAMSAL-KARISTIRMA": "bağlamsal karıştırma",
  "IMLA-YALNIZ": "‘yalnız’ yazımı", "IMLA-YANLIS": "‘yanlış’ yazımı",
  "IMLA-HERKES": "‘herkes’ yazımı", "IMLA-HERSEY": "‘her şey’ yazımı",
  "IMLA-YABANCI": "yabancı kelime yazımı", "IMLA-SAAT": "saat yazımı",
  "IMLA-KESME": "kesme işareti", "IMLA-KISALTMA": "kısaltma yazımı",
  "IMLA-SIRA-SAYI": "sıra sayısı yazımı", "IMLA-DUZELTME-ISARETI": "düzeltme işareti",
  "IMLA-TURKCE-KARAKTER": "Türkçe karakter", "IMLA-NOKTALAMA": "noktalama",
  "IMLA-BIRIM": "birim yazımı", "HUNSPELL": "sözlük denetimi",
  "GRAMER-OZNE-YUKLEM": "özne-yüklem uyumu", "GRAMER-TAMLAMA": "tamlama",
  "GRAMER-ANLATIM": "anlatım bozukluğu", "GRAMER-CATI": "çatı uyumu",
  "GRAMER-EK-FIIL": "ek-fiil", "GRAMER-SAYI-UYUM": "sayı uyumu",
  "GRAMER-TEKRAR": "gereksiz tekrar", "GRAMER-BOLUNMUS-KELIME": "bölünmüş kelime",
  "TON-RESMI": "resmî ton", "TON-NEZAKET": "nezaket",
  "TON-HITAP-TUTARLILIK": "hitap tutarlılığı", "TON-ACIKLIK": "açıklık",
  "TON-KLISE": "klişe ifade",
};
const ruleLabel = (id) => RULE_LABEL[id] || id;

function esc(s) {
  return s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

// --- İlerleme akışı -------------------------------------------------------
let stepEls = {};
let cells = {};                                  // parça kimliği (1..N) → hücre öğesi
let axisEls = {};                                // eksen anahtarı → rozet öğesi
let progState = { total: 0, done: 0, run: 0 };   // canlı sayaçlar
let progStartMs = 0;                             // geçen süre için başlangıç
let progTimer = null;                            // saniyelik süre yenileme

// Denetlenen dört ekseni bilgi rozeti olarak kur (durum canlı güncellenir).
function buildAxisBadges() {
  const box = $("axisBadges"); box.innerHTML = ""; axisEls = {};
  TYPES.forEach((t) => {
    const el = document.createElement("span");
    el.className = "axis-badge " + t;
    el.innerHTML = `<span class="ax-dot"></span><span class="ax-lbl">${TYPE_LABEL[t]}</span>`;
    box.appendChild(el); axisEls[t] = el;
  });
}
function setAxis(key, status) {
  const el = axisEls[key]; if (!el) return;
  el.classList.remove("active", "done");
  if (status) el.classList.add(status);
}

function stopProgTimer() { if (progTimer) { clearInterval(progTimer); progTimer = null; } }

function resetProgress() {
  $("steps").innerHTML = ""; stepEls = {};
  $("chunkGrid").innerHTML = ""; cells = {};
  buildAxisBadges();
  $("gridHint").style.display = "none";
  $("progHead").textContent = "";
  progState = { total: 0, done: 0, run: 0 };
  progStartMs = Date.now();
  stopProgTimer(); progTimer = setInterval(refreshHead, 1000);
  $("barFill").style.width = "0";
  $("inputCard").style.display = "none";
  $("newAnalysisBar").style.display = "none";
  $("progressCard").style.display = "block";
  $("resultCard").style.display = "none";
  $("extractNote").style.display = "none"; $("extractNote").innerHTML = "";
}

// Sonuç/geçmiş gösterilirken giriş kartı yerine "yeni analiz" çubuğu görünür.
function showResultsView() {
  $("inputCard").style.display = "none";
  $("newAnalysisBar").style.display = "block";
}
function showInputView() {
  $("resultCard").style.display = "none";
  $("newAnalysisBar").style.display = "none";
  $("inputCard").style.display = "block";
  $("text").value = ""; $("file").value = ""; $("fileName").textContent = "";
}

// Geçen süreyi "d:ss" biçiminde ver.
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}

// Üstteki canlı özet + ilerleme çubuğu (bölümler çubuğun %92'sini, kalanı
// tutarlılık/finalize doldurur). Saniyede bir de zamanlayıcıdan çağrılır.
function refreshHead() {
  const t = progState.total;
  const elapsed = progStartMs ? ` · ${fmtElapsed(Date.now() - progStartMs)} geçti` : "";
  let msg;
  if (t <= 0) {
    msg = "Belge hazırlanıyor…";
  } else if (progState.done === 0 && progState.run === 0) {
    msg = `Belgeniz <b>${t}</b> bölüme ayrıldı — yazım, dil bilgisi, ton ve tutarlılık denetleniyor.`;
  } else {
    msg = `<b>${progState.done}/${t}</b> bölüm incelendi` +
      (progState.run > 0 ? ` · <span class="run-n">${progState.run} tanesi işleniyor</span>` : "");
  }
  $("progHead").innerHTML = msg + elapsed;
  if (t > 0) $("barFill").style.width = Math.round((progState.done / t) * 92) + "%";
}

// Kilometre-taşı satırı (tutarlılık/finalize): anahtarla oluştur/güncelle.
function setStep(key, message, status) {
  let el = stepEls[key];
  if (!el) {
    el = document.createElement("div");
    el.className = "step";
    el.innerHTML = '<span class="dot"></span><span class="lbl"></span>';
    $("steps").appendChild(el);
    stepEls[key] = el;
  }
  el.querySelector(".lbl").textContent = message;
  el.classList.remove("active", "done");
  if (status) el.classList.add(status);
}

// Belge okuma özeti + okunamayan içerik uyarıları (ör. görsel içi yazı).
function onExtract(ev) {
  let html = `<div class="ex-summary">${esc(ev.summary || "")}</div>`;
  (ev.warnings || []).forEach((w) => { html += `<div class="ex-warn">⚠ ${esc(w)}</div>`; });
  $("extractNote").innerHTML = html;
  $("extractNote").style.display = "block";
  // Canlı akışta "belge okunuyor" adımını tamamlanmış işaretle (geçmiş
  // görüntülemede progressCard gizli olduğundan dokunma).
  if ($("progressCard").style.display !== "none" && stepEls["extract"]) {
    setStep("extract", "Belge metni okundu", "done");
  }
}
// Yerel geçiş eksenleri (imla/dil bilgisi/ton) bölüm içinde iç içe çalışır;
// tutarlılık ayrı bir geçiştir. Rozet durumu bu üç eksen için topluca yönetilir.
const LOCAL_AXES = ["imla", "dil_bilgisi", "ton"];

function onProgress(ev) {
  switch (ev.stage) {
    case "extract":                        // docx metni çıkarılıyor (adım olarak göster)
      setStep("extract", ev.message || "Belge metni okunuyor…", "active");
      break;
    case "chunk": {
      // Belge N bölüme ayrıldı → hepsini "bekliyor" hücresi olarak önceden çiz.
      progState.total = ev.total;
      const grid = $("chunkGrid");
      for (let i = 1; i <= ev.total; i++) {
        const c = document.createElement("div");
        c.className = "cell"; c.title = "Bölüm " + i + " — bekliyor";
        grid.appendChild(c); cells[i] = c;
      }
      if (ev.total > 0) $("gridHint").style.display = "block";
      refreshHead();
      break;
    }
    case "chunk_start": {                 // bir bölüm işlenmeye başladı (amber, nabız)
      const c = cells[ev.current];
      if (c) { c.classList.add("run"); c.title = ev.message; }
      LOCAL_AXES.forEach((t) => setAxis(t, "active"));  // yerel eksenler denetleniyor
      progState.run++; refreshHead();
      break;
    }
    case "chunk_done": {                   // bir bölüm bitti (yeşil)
      const c = cells[ev.current];
      if (c) { c.classList.remove("run"); c.classList.add("done"); c.title = ev.message; }
      progState.run = Math.max(0, progState.run - 1); progState.done++;
      if (progState.total > 0 && progState.done >= progState.total) {
        LOCAL_AXES.forEach((t) => setAxis(t, "done"));  // tüm bölümler bitti
      }
      refreshHead();
      break;
    }
    case "consistency_start": setAxis("tutarlilik", "active"); setStep("consistency", ev.message, "active"); break;
    case "consistency_done":  setAxis("tutarlilik", "done");   setStep("consistency", ev.message, "done");   break;
    case "finalize":
      setStep("finalize", ev.message, "active");
      $("barFill").style.width = "96%";
      break;
    case "done":
      setStep("finalize", ev.message, "done");
      $("barFill").style.width = "100%";
      stopProgTimer();
      break;
  }
}

// --- Sonuç ----------------------------------------------------------------
let lastPayload = null;   // indir/kopyala için en son gösterilen sonuç (canlı ya da geçmiş)
let activeFilter = null;  // eksene göre süzgeç (null = hepsi)

function renderResult(payload) {
  lastPayload = payload;
  activeFilter = null;      // her yeni sonuçta süzgeci sıfırla
  stopProgTimer();
  document.querySelectorAll(".step.active").forEach((s) => s.classList.add("done"));
  $("barFill").style.width = "100%";
  const source = payload.source;
  const findings = payload.result.findings || [];

  // Özet rozetleri — aynı zamanda eksen süzgeci (tıklanabilir).
  const counts = {}; TYPES.forEach((t) => counts[t] = 0);
  findings.forEach((f) => { if (counts[f.type] !== undefined) counts[f.type]++; });
  let chips = `<span class="chip filter-chip active" data-filter="">Toplam <b>${findings.length}</b> bulgu</span>`;
  TYPES.forEach((t) => { if (counts[t]) chips += `<span class="chip filter-chip" data-filter="${t}" style="border-color:var(--${t})">${TYPE_LABEL[t]} <b>${counts[t]}</b></span>`; });
  // Gözlemler bulgu SAYISINA katılmaz; ayrı, tıklanamaz bir rozet olarak gösterilir.
  const obsCount = (payload.result.observations || []).length;
  if (obsCount) chips += `<span class="chip obs-chip" title="Doğrulanmamış gözlem — editör değerlendirmesi gerekir">🔍 <b>${obsCount}</b> gözlem</span>`;
  $("summary").innerHTML = chips;

  // Kaynak metin + vurgular (çakışmayanları sırayla işaretle)
  const located = findings.filter((f) => f.start != null && f.end != null).sort((a, b) => a.start - b.start);
  let html = "", cur = 0, lastEnd = -1;
  for (const f of located) {
    if (f.start < lastEnd) continue; // çakışma → atla
    html += esc(source.slice(cur, f.start));
    html += `<mark class="${f.type}" data-start="${f.start}" title="${esc(f.explanation)}">${esc(source.slice(f.start, f.end))}</mark>`;
    cur = f.end; lastEnd = f.end;
  }
  html += esc(source.slice(cur));
  $("source").innerHTML = html || '<span class="muted">(boş)</span>';

  // Bulgu kartları: aynı (tip + alıntı + öneri) tekrarları TEK kartta toplanır
  // (bkz. plan — "hacim/tekrar" sorunu), konum bilgisi hiçbiri KAYBOLMADAN
  // genişletilebilir bir konum listesi olarak korunur. HER kart (tekil olsun
  // grup olsun) tıklanabilir: kaynak metindeki ilgili yere kaydırıp vurgular.
  if (!findings.length) {
    $("findings").innerHTML = '<div class="empty">✓ Hiç bulgu yok — metin temiz görünüyor.</div>';
  } else {
    const order = { imla: 0, dil_bilgisi: 1, ton: 2, tutarlilik: 3 };
    // Türkçe-duyarlı küçültme ("tr" locale): yalnız cümle-başı büyütmesi
    // yüzünden farklı görünen aynı bulguları (örn. "Herşey"/"herşey") aynı
    // grupta toplamak için. Kartta GÖSTERİLEN metin hâlâ orijinal kalır;
    // bu yalnız gruplama KARARINDA kullanılır.
    const normKey = (s) => (s || "").trim().replace(/\s+/g, " ").toLocaleLowerCase("tr");
    const groups = new Map();
    for (const f of findings) {
      const key = `${f.type}|${normKey(f.excerpt)}|${normKey(f.suggestion)}`;
      if (!groups.has(key)) groups.set(key, { ...f, count: 0, occurrences: [] });
      const g = groups.get(key);
      g.count++;
      if (f.start != null) g.occurrences.push({ start: f.start, excerpt: f.excerpt, suggestion: f.suggestion });
    }
    const sorted = Array.from(groups.values()).sort((a, b) =>
      (order[a.type] - order[b.type]) || (b.count - a.count) || ((a.start ?? 1e9) - (b.start ?? 1e9)));

    // Tek bir gruplanmış bulguyu karta çevirir. Tek bulgulu kart: doğrudan
    // kendi konumuna tıklanabilir. Gruplu kart: başlık ilk occurrence'a atlar,
    // "Tüm konumları göster" tam listeyi açar — her satır KENDİ excerpt→suggestion
    // çiftini HER ZAMAN gösterir, tutarlı ve tıklanabilir tam-genişlik blok.
    const cardHtml = (f) => {
      const conf = f.confidence != null ? ` · güven ${(f.confidence * 100).toFixed(0)}%` : "";
      // rule_id insan-okur etikete çevrilir; ham kimlik tooltip'te korunur.
      const rule = f.rule_id ? ` · <span title="${esc(f.rule_id)}">${esc(ruleLabel(f.rule_id))}</span>` : "";
      const sug = f.suggestion ? `<span class="arrow"> → </span><span class="sug">${esc(f.suggestion)}</span>` : "";
      const badge = f.count > 1 ? ` <span class="count-badge">${f.count} yerde</span>` : "";
      const firstStart = f.occurrences.length ? f.occurrences[0].start : f.start;
      const headJump = firstStart != null ? ` data-jump="${firstStart}"` : "";
      const details = f.count > 1 ? `<details><summary>Tüm konumları göster (${f.count})</summary>
        <div class="loc-rows">${f.occurrences.map((o, i) =>
          `<div class="loc-row" data-jump="${o.start}"><b>${i + 1}.</b>${esc(o.excerpt)}<span class="arrow"> → </span><span class="sug">${esc(o.suggestion)}</span></div>`
        ).join("")}</div>
      </details>` : "";
      return `<div class="finding ${f.type}"${headJump}>
        <div class="head"><span class="tag ${f.type}">${TYPE_LABEL[f.type] || f.type}</span>
          <span class="excerpt">${esc(f.excerpt)}</span>${sug}${badge}</div>
        <div class="exp">${esc(f.explanation)}</div>
        <div class="meta">${rule}${conf}</div>
        ${details}
      </div>`;
    };

    // Bulgular eksene göre başlıklı bölümlere ayrılır (tür sırası korunur).
    let sectionsHtml = "";
    for (const t of TYPES) {
      const items = sorted.filter((g) => g.type === t);
      if (!items.length) continue;
      sectionsHtml += `<section class="find-section" data-section="${t}">
        <h3 class="section-head ${t}">${TYPE_LABEL[t]} <span class="section-count">${items.length}</span></h3>
        ${items.map(cardHtml).join("")}
      </section>`;
    }
    $("findings").innerHTML = sectionsHtml;
  }

  // Gözlemler — bulgulardan AYRI, katlanmayan ayrı bölüm. Kaynak metinde
  // vurgulanmaz (offset yok); yalnız alıntı + not. Bulgu süzgecinden etkilenmez
  // (data-section taşımaz → applyFilter dokunmaz), her zaman görünür.
  const observations = payload.result.observations || [];
  if (observations.length) {
    const obsItems = observations.map((o) =>
      `<div class="obs-item"><div class="obs-excerpt">${esc(o.excerpt)}</div><div class="obs-note">${esc(o.note)}</div></div>`
    ).join("");
    $("findings").innerHTML += `<section class="obs-section">
      <h3 class="obs-head">🔍 Gözlemler — doğrulanmamış <span class="section-count">${observations.length}</span></h3>
      <p class="obs-disclaimer">Bunlar kesin bulgu DEĞİLDİR; modelin bir kurala bağlayamadığı ama şüphelendiği yerlerdir. Öneri içermez — editörün değerlendirmesi gerekir.</p>
      ${obsItems}
    </section>`;
  }
  applyFilter();
  $("resultCard").style.display = "block";
  showResultsView();
}

// Aktif eksen süzgecini uygula: yalnız seçili türün bölümünü göster (null=hepsi).
function applyFilter() {
  document.querySelectorAll("#findings [data-section]").forEach((s) => {
    s.style.display = (!activeFilter || s.dataset.section === activeFilter) ? "" : "none";
  });
}

// Özet rozetine tıkla → eksene göre süz (aynı çipe yeniden tıklama gerekmez;
// "Toplam" çipi süzgeci sıfırlar).
$("summary").addEventListener("click", (e) => {
  const chip = e.target.closest(".filter-chip");
  if (!chip) return;
  activeFilter = chip.dataset.filter || null;
  document.querySelectorAll("#summary .filter-chip").forEach((c) =>
    c.classList.toggle("active", (c.dataset.filter || null) === activeFilter));
  applyFilter();
});

// Bir konum çipine tıklanınca kaynak metindeki ilgili <mark>'a kaydır + vurgula.
$("findings").addEventListener("click", (e) => {
  const chip = e.target.closest("[data-jump]");
  if (!chip) return;
  const mark = $("source").querySelector(`mark[data-start="${chip.dataset.jump}"]`);
  if (!mark) return;
  mark.scrollIntoView({ block: "center", behavior: "smooth" });
  mark.classList.remove("flash"); void mark.offsetWidth; // yeniden tetikle
  mark.classList.add("flash");
  setTimeout(() => mark.classList.remove("flash"), 1000);
});

// --- Ajan-dostu rapor (indir / kopyala) ----------------------------------
// Sonuçları (kaynak metin + bulgular) yapılandırılmış Markdown'a çevirir; amaç
// tüm çıktıyı bir yapay-zekâ ajanına tek parça yapıştırmayı kolaylaştırmak.
// Tamamen istemci-tarafı: veri zaten `lastPayload` içinde, sunucuya gitmez.

// Offset'ten 1-tabanlı satır numarası (start'tan önceki '\n' sayısı + 1).
function findingLine(source, start) {
  if (start == null) return null;
  let line = 1;
  for (let i = 0; i < start && i < source.length; i++) if (source[i] === "\n") line++;
  return line;
}

function buildReport(payload) {
  const source = payload.source || "";
  const findings = (payload.result && payload.result.findings) || [];

  const counts = {}; TYPES.forEach((t) => counts[t] = 0);
  findings.forEach((f) => { if (counts[f.type] !== undefined) counts[f.type]++; });

  const stamp = new Date().toISOString().slice(0, 19).replace("T", " ");
  let out = "# Türkçe Dil Analizi Raporu\n\n";
  out += `- Tarih: ${stamp}\n`;
  const dist = TYPES.filter((t) => counts[t]).map((t) => `${TYPE_LABEL[t]} ${counts[t]}`);
  out += `- Toplam bulgu: ${findings.length}` + (dist.length ? ` (${dist.join(", ")})` : "") + "\n\n";

  if (!findings.length) {
    out += "Hiç bulgu yok — metin temiz görünüyor.\n\n";
  } else {
    out += "## Bulgular\n\n";
    for (const t of TYPES) {
      const group = findings.filter((f) => f.type === t)
        .sort((a, b) => (a.start ?? 1e9) - (b.start ?? 1e9));
      if (!group.length) continue;
      out += `### ${TYPE_LABEL[t]} (${group.length})\n\n`;
      group.forEach((f, i) => {
        const sug = f.suggestion ? ` → ${f.suggestion}` : "";
        out += `${i + 1}. "${f.excerpt}"${sug}\n`;
        if (f.explanation) out += `   - Açıklama: ${f.explanation}\n`;
        const meta = [];
        // Ajan-dostu: ham kimliği koru, insan-okur etiketi parantezde ekle.
        if (f.rule_id) meta.push(RULE_LABEL[f.rule_id] ? `${f.rule_id} (${RULE_LABEL[f.rule_id]})` : f.rule_id);
        if (f.confidence != null) meta.push(`güven %${Math.round(f.confidence * 100)}`);
        if (meta.length) out += `   - ${meta.join(" · ")}\n`;
        if (f.start != null) {
          const ln = findingLine(source, f.start);
          out += `   - Konum: karakter ${f.start}–${f.end}` + (ln ? ` (satır ${ln})` : "") + "\n";
        }
        out += "\n";
      });
    }
  }

  // Gözlemler — bulgulardan AYRI bölüm (doğrulanmamış). Gözlem yoksa hiç yazma.
  const observations = (payload.result && payload.result.observations) || [];
  if (observations.length) {
    out += "## Gözlemler (doğrulanmamış — editör değerlendirmesi gerekir)\n\n";
    out += "> Bunlar kesin bulgu değildir; bir kurala bağlanamayan, şüphe uyandıran " +
           "yerlerdir. Öneri içermez.\n\n";
    observations.forEach((o, i) => {
      out += `${i + 1}. "${o.excerpt}"\n`;
      if (o.note) out += `   - Not: ${o.note}\n`;
      out += "\n";
    });
  }

  out += "## Kaynak Metin\n\n```\n" + source + "\n```\n";
  return out;
}

function flashBtn(btn, msg) {
  const old = btn.textContent;
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = old; }, 1500);
}

function downloadReport() {
  if (!lastPayload) return;
  const blob = new Blob([buildReport(lastPayload)], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0, 19).replace(/[-:T]/g, "");
  a.href = url; a.download = `dil-analizi-${stamp}.md`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function copyReport() {
  if (!lastPayload) return;
  const md = buildReport(lastPayload);
  try {
    await navigator.clipboard.writeText(md);       // 127.0.0.1 güvenli bağlam → çalışır
  } catch (e) {                                     // eski tarayıcı / izin yoksa yedek
    const ta = document.createElement("textarea");
    ta.value = md; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    ta.remove();
  }
  flashBtn($("copyBtn"), "✓ Kopyalandı");
}

$("downloadBtn").addEventListener("click", downloadReport);
$("copyBtn").addEventListener("click", copyReport);

// --- Log (geçmiş analizler) ----------------------------------------------
let activeLogId = null;

function fmtDate(iso) { return iso ? iso.replace("T", " ") : ""; }

async function loadHistory() {
  let items = [];
  try { items = await (await fetch("/history")).json(); }
  catch (e) { return; }  // sunucu erişilemezse listeyi olduğu gibi bırak
  const list = $("logList");
  if (!items.length) { list.innerHTML = '<div class="log-empty">Henüz kayıt yok.</div>'; return; }
  list.innerHTML = items.map((m) => {
    const n = (m.counts && m.counts.toplam) || 0;
    const cls = m.id === activeLogId ? "log-item active" : "log-item";
    return `<div class="${cls}" data-id="${esc(m.id)}">
      <button class="log-del" data-del="${esc(m.id)}" title="Sil">×</button>
      <div class="log-title" title="${esc(m.title || "")}">${esc(m.title || "(başlıksız)")}</div>
      <div class="log-meta"><span class="kind">${esc(m.kind || "")}</span> · ${esc(fmtDate(m.created_at))} · ${n} bulgu</div>
    </div>`;
  }).join("");
}

// Geçmiş kaydı aç: çıktıyı mevcut renderResult ile BİREBİR yeniden çiz.
async function openHistory(id) {
  let rec;
  try {
    const r = await fetch("/history/get?id=" + encodeURIComponent(id));
    if (!r.ok) return;
    rec = await r.json();
  } catch (e) { return; }
  activeLogId = id;
  $("progressCard").style.display = "none";
  $("extractNote").style.display = "none"; $("extractNote").innerHTML = "";
  if (rec.extract) onExtract(rec.extract);   // belge okuma notunu da geri göster
  renderResult(rec.payload);
  document.querySelectorAll(".log-item").forEach((el) =>
    el.classList.toggle("active", el.dataset.id === id));
}

async function deleteHistory(id) {
  try { await fetch("/history/delete?id=" + encodeURIComponent(id), { method: "POST" }); }
  catch (e) {}
  if (activeLogId === id) activeLogId = null;
  loadHistory();
}

$("logList").addEventListener("click", (e) => {
  const del = e.target.closest("[data-del]");
  if (del) { e.stopPropagation(); deleteHistory(del.dataset.del); return; }
  const item = e.target.closest(".log-item");
  if (item) openHistory(item.dataset.id);
});

// --- Akışı başlat ---------------------------------------------------------
let running = false;
async function start() {
  if (running) return;
  const file = $("file").files[0];
  const text = $("text").value;
  if (!file && !text.trim()) { alert("Önce bir metin yapıştırın ya da .docx seçin."); return; }

  running = true; $("run").disabled = true; resetProgress();
  try {
    let job;
    if (file) {
      const r = await fetch("/upload?kind=docx&name=" + encodeURIComponent(file.name), { method: "POST", body: file });
      job = (await r.json()).job;
    } else {
      const r = await fetch("/upload?kind=text", { method: "POST", body: text });
      job = (await r.json()).job;
    }
    const es = new EventSource("/stream?job=" + job);
    es.addEventListener("progress", (e) => onProgress(JSON.parse(e.data)));
    es.addEventListener("extract", (e) => onExtract(JSON.parse(e.data)));
    es.addEventListener("result", (e) => {
      const p = JSON.parse(e.data);
      activeLogId = p.id || null;  // yeni kayıt listede vurgulansın
      renderResult(p);
    });
    es.addEventListener("error", (e) => {
      const msg = e.data ? JSON.parse(e.data).message : "Bağlantı hatası.";
      $("steps").innerHTML += `<div class="step err">⚠ ${esc(msg)}</div>`;
      stopProgTimer();
      es.close(); running = false; $("run").disabled = false;
    });
    es.addEventListener("done", () => {
      es.close(); running = false; $("run").disabled = false;
      loadHistory();  // yeni kayıt anında log paneline düşsün
    });
  } catch (err) {
    $("steps").innerHTML += `<div class="step err">⚠ ${esc(String(err))}</div>`;
    stopProgTimer();
    running = false; $("run").disabled = false;
  }
}

$("run").addEventListener("click", start);
$("file").addEventListener("change", () => {
  const f = $("file").files[0];
  $("fileName").textContent = f ? f.name : "";
  if (f) $("text").value = "";
});

// Log paneli açılıp kapanır; ok yönü duruma göre değişir (‹ açık, › kapalı).
$("logToggle").addEventListener("click", () => {
  const collapsed = document.body.classList.toggle("log-collapsed");
  $("logToggle").textContent = collapsed ? "›" : "‹";
});

// Sonuç ekranından "yeni analiz" akışına dönüş.
$("newAnalysisBtn").addEventListener("click", showInputView);

loadHistory();  // sayfa açılışında geçmiş kayıtları getir
</script>
</body>
</html>
